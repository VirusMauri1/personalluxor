version: '3.8'

services:
  frontend:
    build: .
    container_name: luxor-compose
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: luxor-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: luxor_user
      POSTGRES_PASSWORD: luxor_pass
      POSTGRES_DB: luxor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: